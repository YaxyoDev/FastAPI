{% include 'base.html' %}
{% block content %}
    
    <div class="container">
        <div class="card">

            <div class="card-header">
                <h3>Login</h3>
            </div>

            <div class="card-body">
                <form id="loginForm">

                    <div class="form-group">
                        <label for="">Username</label>
                        <input type="text" class="form-control" name="username" autocomplete="username" required>
                    </div>

                    <div class="form-group">
                        <label for="">Password</label>
                        <input type="password" class="form-control" name="password" autocapitalize="current-password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Login
                    </button>

                </form>
            </div>

            <div class="card-footer text-muted">
                <a href="/auth/register-page"> No account, register ? </a>
            </div>

        </div>
    </div>

{% endblock %}
